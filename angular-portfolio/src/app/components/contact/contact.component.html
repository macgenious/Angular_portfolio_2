<section id="contact" class="contact-section">
  <div class="container">
    <h2>CONTACT ME</h2>
    <p class="section-subtitle">
      Let's connect — choose your preferred channel below.
    </p>

    <div class="contact-cards">

      <!-- Gmail -->
      <button class="contact-card gmail-card" (click)="openGmail()" aria-label="Send me an email via Gmail">
        <div class="card-inner">
          <div class="card-glow"></div>
          <div class="card-icon">
            <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <rect width="48" height="48" rx="10" fill="transparent" />
              <!-- Gmail M shape -->
              <path d="M6 14.5L24 27L42 14.5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
              <rect x="6" y="14" width="36" height="20" rx="3" stroke="currentColor" stroke-width="2.5" fill="none" />
            </svg>
          </div>
          <span class="card-label">Gmail</span>
          <span class="card-hint">Send me an email</span>
          <div class="card-arrow">→</div>
        </div>
      </button>

      <!-- LinkedIn -->
      <button class="contact-card linkedin-card" (click)="openLinkedIn()" aria-label="Visit my LinkedIn profile">
        <div class="card-inner">
          <div class="card-glow"></div>
          <div class="card-icon">
            <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <rect width="48" height="48" rx="10" fill="transparent" />
              <rect x="6" y="6" width="36" height="36" rx="6" stroke="currentColor" stroke-width="2.5" fill="none" />
              <rect x="13" y="20" width="5" height="15" rx="1" fill="currentColor" />
              <circle cx="15.5" cy="15.5" r="2.5" fill="currentColor" />
              <path
                d="M23 20H28V23C28 23 29 20 33 20C37 20 37 23.5 37 26V35H32V27C32 25.5 31.5 24 30 24C28.5 24 28 25.5 28 27V35H23V20Z"
                fill="currentColor" />
            </svg>
          </div>
          <span class="card-label">LinkedIn</span>
          <span class="card-hint">Let's connect professionally</span>
          <div class="card-arrow">→</div>
        </div>
      </button>

      <!-- GitHub -->
      <button class="contact-card github-card" (click)="openGitHub()" aria-label="Visit my GitHub profile">
        <div class="card-inner">
          <div class="card-glow"></div>
          <div class="card-icon">
            <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path
                d="M24 4C12.95 4 4 13.13 4 24.4C4 33.37 9.87 40.9 18.07 43.56C19.07 43.74 19.43 43.12 19.43 42.59V38.87C13.87 40.09 12.69 36.16 12.69 36.16C11.77 33.83 10.45 33.22 10.45 33.22C8.62 31.97 10.58 32 10.58 32C12.6 32.14 13.66 34.09 13.66 34.09C15.46 37.15 18.34 36.26 19.51 35.74C19.69 34.43 20.22 33.54 20.8 33.04C16.35 32.53 11.68 30.81 11.68 23.21C11.68 20.99 12.47 19.18 13.7 17.76C13.5 17.25 12.79 15.19 13.9 12.41C13.9 12.41 15.59 11.87 19.42 14.49C20.96 14.05 22.64 13.83 24.3 13.82C26.05 13.83 27.73 14.05 29.27 14.49C33.1 11.87 34.79 12.41 34.79 12.41C35.9 15.19 35.19 17.25 34.99 17.76C36.22 19.18 37.01 20.99 37.01 23.21C37.01 30.83 32.33 32.52 27.87 33.02C28.6 33.64 29.25 34.86 29.25 36.73V42.59C29.25 43.12 29.61 43.75 30.63 43.55C38.82 40.88 44.68 33.36 44.68 24.4C44.68 13.13 35.73 4 24.68 4H24Z"
                fill="currentColor" />
            </svg>
          </div>
          <span class="card-label">GitHub</span>
          <span class="card-hint">Check out my repositories</span>
          <div class="card-arrow">→</div>
        </div>
      </button>

    </div>
  </div>
</section>
